<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Visitas IT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #003366;
            --secondary: #f4f7f6;
            --accent: #27ae60;
            --danger: #e74c3c;
            --border: #d1d8e0;
            --warning: #f39c12;
            --dark: #34495e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--secondary); padding: 20px; color: #333; }
        .card { 
            max-width: 1300px; 
            margin: 0 auto; 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h2 { margin: 0; color: var(--primary); }
        .btn-nav {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn-nav:hover { background: #002244; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 10px; border: 1px solid var(--border); text-align: left; }
        th { background: #f8f9fa; color: var(--primary); }
        .btn-action { 
            border: none; 
            padding: 5px 8px; 
            cursor: pointer; 
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            margin-right: 2px;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .btn-view { background: var(--primary); }
        .btn-pdf { background: var(--dark); }
        .btn-note { background: var(--warning); }
        .btn-delete { background: var(--danger); }
        #pdf-template { display: none; background: white; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 50%; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .close { float: right; cursor: pointer; font-size: 28px; font-weight: bold; color: #999; }
        .fail-item { border-left: 4px solid var(--danger); padding: 8px; margin-bottom: 5px; background: #fff5f5; font-size: 13px; }
        .badge-resp { background: #eee; padding: 2px 5px; border-radius: 3px; font-size: 11px; }
    </style>
</head>
<body>
<div class="card">
    <div class="header-flex">
        <h2>Historial de Visitas IT</h2>
        <a href="Checklist.html" class="btn-nav">+ Nueva Evaluación</a>
    </div>
    <table id="tablaVisitas">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Empresa</th>
                <th>Zona</th>
                <th>Sucursal</th>
                <th>Folio</th>
                <th>%</th>
                <th>Fecha Solución</th>
                <th>Observaciones</th>
                <th style="width: 220px;">Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<div id="pdf-template"></div>
<div id="modalPendientes" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h3 id="modalTitulo">Detalles de la Visita</h3>
        <hr>
        <div id="listaPendientes" style="max-height: 400px; overflow-y: auto; margin-top: 15px;"></div>
    </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
const firebaseConfig = {
    databaseURL: "https://mydbu-fbc33-default-rtdb.firebaseio.com/"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
async function cargarHistorial() {

    const tbody = document.querySelector('#tablaVisitas tbody');

    tbody.innerHTML = `
        <tr>
            <td colspan="9" style="text-align:center">
                Cargando información...
            </td>
        </tr>
    `;

    try {

        const snapshot = await get(ref(db, 'visitasIT'));

        const data = snapshot.val() || {};

        const historial = Object.entries(data).map(([id, val]) => ({
            id,
            ...val
        }));

        pintarTabla(historial);

    } catch(error) {

        console.error(error);

        tbody.innerHTML = `
            <tr>
                <td colspan="9" style="text-align:center;color:red">
                    Error al cargar información
                </td>
            </tr>
        `;
    }
}
function pintarTabla(historial) {

    const tbody = document.querySelector('#tablaVisitas tbody');

    tbody.innerHTML = "";

    const fragment = document.createDocumentFragment();

    historial
    .sort((a,b) => (b.fecha || '').localeCompare(a.fecha || ''))
    .forEach((visita) => {

        const tr = document.createElement('tr');

        tr.innerHTML = `
            ...
        `;

        fragment.appendChild(tr);
    });

    tbody.appendChild(fragment);
}
// ================== FUNCIÓN RECUPERAR PDF COMPLETO ==================
window.recuperarPDF = async function(id) {
    const snap = await get(ref(db, 'visitasIT/' + id));
    if(!snap.exists()) return alert("No se encontraron datos");
    const v = snap.val();
    const temp = document.getElementById('pdf-template');
     let detalleCompletoHTML = "";
    for(let key in v.detalleEvaluacion) {
        const item = v.detalleEvaluacion[key];
        const statusText = item.cumple ? "CUMPLE" : "NO CUMPLE";
        const statusColor = item.cumple ? "#27ae60" : "#e74c3c";
        let fotosHTML = "";
        if (item.evidencia && Array.isArray(item.evidencia) && item.evidencia.length > 0) {
            fotosHTML = `<div style="display: flex; flex-wrap: wrap; gap: 4px;">`;
            item.evidencia.forEach(imgBase64 => {
                fotosHTML += `
                    <div style="width:70px; height:55px; border:1px solid #ddd; border-radius:3px; overflow:hidden;">
                        <img src="${imgBase64}" style="width:100%; height:100%; object-fit:cover;">
                    </div>`;
            });
            fotosHTML += `</div>`;
        } else {
            fotosHTML = `<div style="width: 100px; height: 55px; background: #f9f9f9; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #999;">Sin Evidencia</div>`;
        }
        detalleCompletoHTML += `
            <div style="margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 8px; page-break-inside: avoid; break-inside: avoid;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <span style="font-size: 11px; font-weight: bold; color: #333;">${item.titulo}</span>
                    <span style="font-size: 9px; font-weight: bold; color: ${statusColor}; border: 1px solid ${statusColor}; padding: 1px 5px; border-radius: 3px;">${statusText}</span>
                </div>
                <div style="display: flex; gap: 12px; align-items: flex-start;">
                    <div style="flex: 0 0 auto;">${fotosHTML}</div>
                    <div style="font-size: 10px; color: #555; flex: 1;">
                        <p style="margin: 0;"><b>Responsable:</b> ${item.responsable || 'No asignado'}</p>
                       <p style="margin: 2px 0 0 0;"><b>Notas:</b> ${item.comentario || 'Sin comentarios adicionales.'}</p>
                    </div>
                </div>
            </div>
        `;
    }
        
 temp.innerHTML = `
        <div style="padding: 30px; background: white; color: #333;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #003366; padding-bottom: 10px; margin-bottom: 20px;">
                <img src="https://i.ytimg.com/vi/GQ2mlLhIck8/mqdefault.jpg" style="width: 100px;">
                <div style="text-align: right;">
                    <h2 style="color: #003366; margin: 0; font-size: 20px;">REPORTE DE EVALUACIÓN IT</h2>
                    <p style="margin: 2px 0; font-size: 11px; color: #666;">Folio: <b style="color: #003366;">${v.folio}</b></p>
                    <p style="margin: 2px 0; font-size: 11px; color: #666;">Fecha de Visita: ${v.fecha}</p>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f4f7f6; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 11px;">
                <div>
                    <p style="margin: 4px 0;"><b>Empresa:</b> ${v.empresa}</p>
                    <p style="margin: 4px 0;"><b>Sucursal:</b> ${v.sucursal}</p>
                </div>
                <div>
                    <p style="margin: 4px 0;"><b>Zona:</b> ${v.zona}</p>
                    <p style="margin: 4px 0;"><b>Nivel de Cumplimiento:</b> <span style="font-size: 14px; color: #003366; font-weight: bold;">${v.cumplimiento}</span></p>
                </div>
            </div>

            <h4 style="background: #003366; color: white; padding: 6px 12px; margin-bottom: 15px; border-radius: 4px; font-size: 12px;">DETALLE COMPLETO DE LA EVALUACIÓN</h4>
            ${detalleCompletoHTML}

            <div style="margin-top: 20px; page-break-inside: avoid; break-inside: avoid;">
                <h4 style="border-bottom: 2px solid #003366; color: #003366; padding-bottom: 5px; font-size: 12px;">OBSERVACIONES GENERALES</h4>
                <p style="font-size: 10px; background: #fffdf5; padding: 10px; border: 1px solid #f39c12; border-radius: 4px; white-space: pre-line;">${v.observaciones || 'Sin observaciones registradas.'}</p>
                <p style="font-size: 10px; margin-top: 5px;"><b>Fecha tentativa de solución:</b> ${v.fechaSolucion || 'N/A'}</p>
            </div>

            <div style="margin-top: 50px; display: flex; justify-content: space-around; text-align: center; font-size: 10px; page-break-inside: avoid; break-inside: avoid;">
                <div style="width: 180px;">
                    ${v.firmaEncargado ? `<img src="${v.firmaEncargado}" style="max-width: 140px; border-bottom: 1px solid #000;">` : `<div style="height: 60px; border-bottom: 1px solid #000;"></div>`}
                    <p style="margin-top: 5px;"><b>FIRMA ENCARGADO</b><br>Responsable de Sucursal</p>
                </div>
                <div style="width: 180px;">
                    ${v.firmaSistemas ? `<img src="${v.firmaSistemas}" style="max-width: 140px; border-bottom: 1px solid #000;">` : `<div style="height: 60px; border-bottom: 1px solid #000;"></div>`}
                    <p style="margin-top: 5px;"><b>FIRMA SISTEMAS</b><br>Técnico Evaluador</p>
                </div>
            </div>
        </div>
    `;
    const opt = {
        margin: [10, 10],
        filename: `Reporte_IT_${v.sucursal}_${v.folio}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 3, useCORS: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] } // Usa las reglas CSS para los saltos
    };

    temp.style.display = 'block'; 
    html2pdf().set(opt).from(temp).save().then(() => {
        temp.style.display = 'none';
        temp.innerHTML = "";
    });
};

// ================== OTRAS FUNCIONES ==================
window.verPendientes = function(id) {
    const visitasRef = ref(db, 'visitasIT/' + id);
    onValue(visitasRef, (snap) => {
        const visita = snap.val();
        if(!visita) return;
        const lista = document.getElementById('listaPendientes');
        lista.innerHTML = "";
        let hay = false;
        for (let key in visita.detalleEvaluacion) {
            const item = visita.detalleEvaluacion[key];
            if (item.cumple === false) {
                hay = true;
                const div = document.createElement('div');
                div.className = "fail-item";
                div.innerHTML = `<b>${item.titulo}</b> <span class="badge-resp">${item.responsable}</span>`;
                lista.appendChild(div);
            }
        }
        if (!hay) lista.innerHTML = "<p style='text-align:center; color:green;'><b>100% Cumplimiento. No hay pendientes.</b></p>";
        document.getElementById('modalPendientes').style.display = "block";
    }, { onlyOnce: true });
};
window.eliminarRegistro = function(id) {
    if(confirm("¿Estás seguro de eliminar este registro permanentemente?")) {
        remove(ref(db, 'visitasIT/' + id));
    }
};
window.agregarNota = function(id) {
    const nota = prompt("Escribe la nota adicional para este reporte:");
    if(!nota) return;
    const refVisita = ref(db, 'visitasIT/' + id);
    get(refVisita).then((snap) => {
        const data = snap.val();
        const nuevaObs = (data.observaciones || "") + "\n[NOTA " + new Date().toLocaleDateString() + "]: " + nota;
        update(refVisita, { observaciones: nuevaObs });
    });
};
window.cerrarModal = function() {
    document.getElementById('modalPendientes').style.display = "none";
};
window.onload = cargarHistorial;
</script>

<script>
    // Seguridad y Bloqueos
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>
</body>
</html>
