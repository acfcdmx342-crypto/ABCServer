<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Sucursales - Reporte IT</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary: #003366;
            --secondary: #f4f7f6;
            --accent: #27ae60;
            --danger: #e74c3c;
            --border: #d1d8e0;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--secondary); margin: 0; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        
        .section { display: none; padding: 30px; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        .logo-container { width: 200px; margin: 0 auto 15px; display: block; }
        .logo-container img { width: 100%; height: auto; display: block; }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: var(--primary); }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 15px; transition: border 0.3s; }

        .rubro-card { 
            background: #fff; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 18px; 
            margin-bottom: 15px; 
            border-left: 5px solid var(--primary);
            page-break-inside: avoid;
        }
        .rubro-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .rubro-title { font-weight: bold; font-size: 15px; color: #2c3e50; }
        
        .status-badge { display: flex; gap: 8px; }
        .status-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; background: #fdfdfd; color: #7f8c8d; }
        .status-btn.selected-cumple { background: var(--accent) !important; color: white !important; border-color: var(--accent); }
        .status-btn.selected-nocumple { background: var(--danger) !important; color: white !important; border-color: var(--danger); }

        .pdf-header-box { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; border: 1px solid #eee; }
        .pdf-blue-bar { background: var(--primary); color: white; padding: 10px 20px; font-weight: bold; border-radius: 5px; margin: 20px 0; text-transform: uppercase; }
        .status-pdf { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center; border: 1px solid; }
        .status-pdf.cumple { background: #e6f4ea; color: #1e7e34; border-color: #c3e6cb; }
        .status-pdf.nocumple { background: #fce8e6; color: #d93025; border-color: #fad2cf; }

        .rubro-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
        
        .img-preview-container { 
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        .img-preview { 
            width: 70px; 
            height: 50px; 
            object-fit: cover;
            border-radius: 4px; 
            border: 1px solid #ddd; 
        }

        .sig-container { border: 1px solid var(--border); background: #fafafa; margin-top: 5px; border-radius: 4px; }
        canvas { width: 100%; height: 120px; touch-action: none; }

        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; transition: opacity 0.3s; }
        .btn-next { background: var(--primary); color: white; }
        .btn-back { background: #95a5a6; color: white; }
        .btn-pdf { background: #34495e; color: white; margin-top: 10px;}
        .btn-save { background: #2ecc71; color: white; margin-top: 10px;}
        .btn-clear { background: #f1f2f6; color: #57606f; font-size: 11px; padding: 4px 10px; width: auto; border: 1px solid #ced4da; margin-top: 5px; }

        #detalle-incumplimiento { margin-top: 20px; padding: 15px; border: 1px dashed var(--danger); border-radius: 8px; background: #fff5f5; display: none; page-break-inside: avoid; }
        .item-error { color: var(--danger); font-weight: bold; font-size: 14px; margin-bottom: 5px; display: list-item; margin-left: 20px; }
/* Mejora textarea en móvil */
@media (max-width: 768px) {
    textarea {
        width: 100% !important;
        min-height: 120px; /* más alto */
        font-size: 16px; /* evita zoom en iPhone */
        resize: vertical; /* permite agrandar */
    }

    /* Hace que el comentario ocupe todo el ancho */
    .rubro-header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
    }

    /* Botón y comentario más cómodos */
    .rubro-header button {
        align-self: flex-end;
    }
}
        @media print {
            .section { display: block !important; margin-bottom: 20px; }
            .btn, .btn-clear, .btn-container, input[type="file"] { display: none !important; }
            #detalle-incumplimiento { display: block !important; }
        }
    </style>
</head>

        </div>
        <button class="btn btn-save" onclick="finalizarYRedirigir()">2. GUARDAR EN HISTORIAL Y SALIR</button>

</div>

<script type="module">

    const app = initializeApp(firebaseConfig);

    let catalogoReal = [];

    const rubrosComex = [
        { titulo: "1- Sistema Punto de Venta", items: ["Personal Capacitado para Levantar Soporte", "TPV Limpia", "Impresora Limpia y Funcional", "Terminales Bancarias Funcionando", "NoBreak Funcionando", "Cables Organizados | Ocultos", "XStore Correctos", "Comex TV Configurada y Limpia", "Línea Telmex Funcionando", "MC con WhatsApp Empresas", "Módem Configurado", "Instalación Eléctrica Correcta","IP Limpio y Funcionando","Paginas del grupo añadidas"] },

        {

    window.onload = async () => {
        document.getElementById('fecha_inicio').value = new Date().toLocaleString();
        
        // --- LÓGICA OFFLINE: REVISAR PENDIENTES ---
        if(navigator.onLine) {
            await cargarBaseDatos();
            await sincronizarPendientes();
        } else {
            cargarCatalogoDesdeCache();
        }

        window.sigEncargado = new SignaturePad(document.getElementById('pad-encargado'));
        window.sigSistemas = new SignaturePad(document.getElementById('pad-sistemas'));
    };

    // --- FUNCIONES DE PERSISTENCIA OFFLINE ---
    async function sincronizarPendientes() {
        const pendientes = JSON.parse(localStorage.getItem('visitasIT_pendientes') || "[]");
        if(pendientes.length === 0) return;

        console.log("Detectados registros offline. Sincronizando...");
        for (let i = 0; i < pendientes.length; i++) {
            try {
                await push(ref(db, 'visitasIT'), pendientes[i]);
                pendientes.splice(i, 1);
                i--;
            } catch (e) { console.error("Fallo sincro parcial", e); }
        }
        localStorage.setItem('visitasIT_pendientes', JSON.stringify(pendientes));
        if(pendientes.length === 0) console.log("Sincronización completa.");
    }

    function cargarCatalogoDesdeCache() {
        const cache = localStorage.getItem('cache_sucursales');
        if(cache) {
            catalogoReal = JSON.parse(cache);
            poblarEmpresas();
        }
    }

    function poblarEmpresas() {
        const sel = document.getElementById('selEmpresa');
        sel.innerHTML = '<option value="">Seleccione Empresa...</option>';
        [...new Set(catalogoReal.map(c => c.empresa))].sort().forEach(e => sel.add(new Option(e, e)));
    }

    async function comprimirImagen(base64) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = base64;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.7)); // 0.7 = 70% calidad
            };
        });
    }

    async function cargarBaseDatos() {
        try {
            const snap = await get(ref(db, 'sucursales'));
            if(snap.exists()) {
                catalogoReal = Object.values(snap.val()).map(i => ({
                    empresa: String(i.empresa).toUpperCase(),
                    zona: String(i.zona).toUpperCase(),
                    nombre: String(i.nombre).toUpperCase()
                }));
                localStorage.setItem('cache_sucursales', JSON.stringify(catalogoReal));
                poblarEmpresas();
            }
        } catch (e) { 
            console.error("Error Firebase, intentando usar cache local");
            cargarCatalogoDesdeCache();
        }
    }

    window.cambioEmpresa = function() {
        const emp = document.getElementById('selEmpresa').value;
        const selZ = document.getElementById('selZona');
        const selS = document.getElementById('selSucursal');
        selZ.innerHTML = '<option value="">Seleccione Zona...</option>';
        selS.innerHTML = '<option value="">Seleccione Sucursal...</option>';
        selS.disabled = true;
        if(emp) {
            selZ.disabled = false;
            [...new Set(catalogoReal.filter(c => c.empresa === emp).map(c => c.zona))].sort().forEach(z => selZ.add(new Option(z, z)));
            generarSecciones();
        } else {
            selZ.disabled = true;
        }
    };

    window.cargarSucursales = function() {
        const emp = document.getElementById('selEmpresa').value;
        const zona = document.getElementById('selZona').value;
        const selS = document.getElementById('selSucursal');
        selS.innerHTML = '<option value="">Seleccione Sucursal...</option>';
        if(zona) {
            selS.disabled = false;
            catalogoReal.filter(c => c.empresa === emp && c.zona === zona).sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(s => selS.add(new Option(s.nombre, s.nombre)));
        } else {
            selS.disabled = true;
        }
    };
    let currentComentarioId = null;

window.abrirModalComentario = function(id) {
    currentComentarioId = id;
    const modal = document.getElementById("modalComentario");
    const textarea = document.getElementById("modalTextComentario");

    textarea.value = evaluaciones[id].comentario || "";
    modal.style.display = "flex";
};

window.cerrarModal = function() {
    document.getElementById("modalComentario").style.display = "none";
};

window.guardarComentario = function() {
    const texto = document.getElementById("modalTextComentario").value;

    evaluaciones[currentComentarioId].comentario = texto;

    cerrarModal();
};
    function generarSecciones() {

        const rubrosUsar = (empresaSel === "FERREPRECIOS") ? rubrosFerreprecios : rubrosComex;

        rubrosUsar.forEach((sec, idx) => {
            const num = idx + 2;

            s.id = `sec${num}`;
            s.className = 'section';
            
            let html = `
                <header>
                    <div class="logo-container">
                        <img src="https://i.ytimg.com/vi/GQ2mlLhIck8/mqdefault.jpg" alt="Logo Empresa">
                    </div>

                evaluaciones[id] = { titulo: itemTitle, cumple: null, responsable: 'Tienda', evidencia: [],comentario:"" // 👈 NUEVO 
                    };

                <div class="rubro-card">

                            <div class="status-btn" id="n_${id}" onclick="updateStatus('${id}', false, this)">No Cumple</div>
 <!-- ICONO DE COMENTARIO -->
       <button type="button" onclick="abrirModalComentario('${id}')">💬</button>
 </div>
</div>`;

                if (item.type === "nomenclatura") {
                    html += `
                    <div class="form-group" style="margin-top:10px;">
                        <label>Número de equipos:</label>
                        <input type="number" placeholder="Cant." onchange="evaluaciones['${id}'].cantEquipos=this.value">
                        <textarea placeholder="Detalle de nomenclatura..." onchange="evaluaciones['${id}'].detalle=this.value" style="margin-top:5px;"></textarea>
                    </div>`;
                }

                html += `
                    <div class="rubro-footer">
                        <div><label>Resp.</label><select id="resp_${id}" onchange="evaluaciones['${id}'].responsable=this.value">
                        <option>Tienda</option>
                        <option>Soporte Técnico</option>
                        <option>Supervisor</option>
                        <option>Tienda / Soporte Técnico </option>
                        <option>Supervisor / Tienda</option>
                    </select>
                        </div>
                        <div>
                            <label>Evidencia (Máx 5)</label>
   <button onclick="document.getElementById('cam_${id}').click()">📷</button>
<button onclick="document.getElementById('gal_${id}').click()">🖼️</button>

<input id="cam_${id}" type="file" accept="image/*" capture="environment" hidden onchange="window.previewImg(this, 'cont_${id}')">
<input id="gal_${id}" type="file" accept="image/*" hidden onchange="window.previewImg(this, 'cont_${id}')">
            
                            <div id="cont_${id}" class="img-preview-container"></div>
                        </div>
                    </div>
                </div>`;
            });
            
            const esUltima = idx === rubrosUsar.length - 1;
            html += `
                <div class="btn-container">
                    <button class="btn btn-back" onclick="validarSiguiente(${num}, ${num - 1})">Regresar</button>
                    <button class="btn btn-next" onclick="validarSiguiente(${num}, ${num + 1})">${esUltima ? 'Finalizar Evaluación' : 'Continuar'}</button>
                </div>`;
            s.innerHTML = html;
            container.appendChild(s);

            if(esUltima) {

    window.previewImg = async function(input, containerId) {
        const id = containerId.replace('cont_', '');
        const container = document.getElementById(containerId);

        // 🔥 NO limpiar el contenedor ni el array
        if (!evaluaciones[id].evidencia) {
            evaluaciones[id].evidencia = [];
        }

        const disponibles = 5 - evaluaciones[id].evidencia.length;

        if (disponibles <= 0) {
            alert("Ya alcanzaste el límite de 5 imágenes.");
            input.value = "";
            return;
        }

        const files = Array.from(input.files).slice(0, disponibles);

        for (const file of files) {
            const base64Original = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });

            const fotoComprimida = await comprimirImagen(base64Original);

            // 🔥 ACUMULAR imágenes
            evaluaciones[id].evidencia.push(fotoComprimida);

            const img = document.createElement('img');
            img.src = fotoComprimida;
            img.className = 'img-preview';
            container.appendChild(img);
        }

        if (evaluaciones[id].evidencia.length >= 5) {
            alert("Has llegado al máximo de 5 imágenes.");
        }

        // 🔥 limpiar input para permitir volver a seleccionar las mismas imágenes si se desea
        input.value = "";
    };
   
    window.updateStatus = function(id, val, btn) {
        evaluaciones[id].cumple = val;
        btn.parentElement.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected-cumple', 'selected-nocumple'));
        btn.classList.add(val ? 'selected-cumple' : 'selected-nocumple');
    };
window.validarSiguiente = function(actual, sig) {

        return alert("Seleccione sucursal");
    }

    // 🔥 VALIDAR SECCIÓN ACTUAL (OBLIGATORIO)
    if (actual !== 1 && actual !== 'final') {

        let faltantes = [];
// SOLO validar los de la sección actual
    Object.keys(evaluaciones).forEach(id => {
    const select = document.querySelector(`#resp_${id}`);
    if (select) {
        evaluaciones[id].responsable = select.value;
    }
});
        if (faltantes.length > 0) {
            alert(
                "Debes evaluar todos los puntos antes de continuar.\n\nFaltan:\n- " +
                faltantes.join("\n- ")
            );
            return; // ❌ BLOQUEA avance
        }
    }

    const empresaSel = document.getElementById('selEmpresa').value;
    const limite = (empresaSel === "FERREPRECIOS") 
        ? rubrosFerreprecios.length + 1 
        : rubrosComex.length + 1;

    if(sig > limite) {
        calcularYMostrarResumen();
    } else {
        const idActual = actual === 'final' ? 'sec-final' : `sec${actual}`;
        document.getElementById(idActual).classList.remove('active');
        document.getElementById(`sec${sig}`).classList.add('active');
        window.scrollTo(0,0);
    }
};
 function calcularYMostrarResumen() {
        let total = Object.keys(evaluaciones).length, si = 0;
        let erroresHTML = "";
        
        for(let k in evaluaciones) {
            if(evaluaciones[k].cumple === true) {
                si++;
            } else if (evaluaciones[k].cumple === false) {
                erroresHTML += `<div class="item-error">${evaluaciones[k].titulo}</div>`;
            }
        }

        const divDetalle = document.getElementById('detalle-incumplimiento');
        const listaErrores = document.getElementById('lista-errores');
        if(erroresHTML !== "") {
            listaErrores.innerHTML = erroresHTML;
            divDetalle.style.display = "block";
        } else {
            divDetalle.style.display = "none";
        }

        document.getElementById('final-score').innerText = Math.round((si/total)*100) + '%';
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-final').classList.add('active');
        window.scrollTo(0,0);
    }

};

        const nodoDestino = ref(db, 'visitasIT');

        // SI HAY INTERNET: GUARDAR DIRECTO
        if(navigator.onLine) {
            push(nodoDestino, nuevaVisita)
            .then(() => {
                alert("Evaluación Almacenada Correctamente");
                window.location.href = "visitas.html";
            })
            .catch(err => { 
                alert("Error al enviar a la nube. Guardando en dispositivo."); 
                guardarOffline(nuevaVisita);
            });
        } else {
            // SI NO HAY INTERNET: GUARDAR LOCALMENTE
            guardarOffline(nuevaVisita);
        }
    };

    function guardarOffline(datos) {
        const pendientes = JSON.parse(localStorage.getItem('visitasIT_pendientes') || "[]");
        pendientes.push(datos);
        localStorage.setItem('visitasIT_pendientes', JSON.stringify(pendientes));
        alert("Sin conexión. La evaluación se guardó en el dispositivo y se enviará automáticamente al recuperar internet.");
        window.location.href = "visitas.html";
    }
